<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Tigerkid Yang's terminal-inspired personal blog."
    />
    <title>Tigerkid Yang | Terminal Blog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="terminal-shell" aria-label="Terminal blog">
      <section class="terminal-window" aria-live="polite">
        <header class="terminal-titlebar">
          <div class="window-controls" aria-hidden="true">
            <span class="control close"></span>
            <span class="control minimize"></span>
            <span class="control maximize"></span>
          </div>
          <p class="window-title">tigerkid@github-pages:~/blog</p>
          <time id="clock" class="clock" datetime=""></time>
        </header>

        <div id="terminal" class="terminal" tabindex="-1">
          <div class="intro">
            <p class="ascii" aria-hidden="true">TigerKid Terminal Blog</p>
            <p>
              Welcome. Type <button class="inline-command" data-command="help">help</button>
              or <button class="inline-command" data-command="ls">ls</button> to begin.
            </p>
          </div>
          <div id="output" class="output"></div>
          <form id="command-form" class="command-line" autocomplete="off">
            <label class="prompt" for="command-input">visitor@site:~$</label>
            <input
              id="command-input"
              name="command"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              aria-label="Terminal command"
              autofocus
            />
          </form>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
